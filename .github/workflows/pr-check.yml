name: pr check workflow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    
jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      
      - name: print branch name
        run: | 
          echo "PR check running for branch: ${{ github.head_ref }}"
